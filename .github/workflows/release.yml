name: Create Release

on:
  push:
    tags:
      - 'v*' # only triggers when a tag like v1.0.0 is pushed
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Multi-Platform Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: scuttle-win-x64.zip
            binary_name: scuttle.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: scuttle-linux-x64.zip
            binary_name: scuttle
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: scuttle-mac-x64.zip
            binary_name: scuttle

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      # --- WEB CLIENT BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-client/package-lock.json

      - name: Build Web Client
        working-directory: apps/web-client
        run: |
          npm install
          npm run build

      # --- DESKTOP LAUNCHER BUILD ---
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        env:
          NODE_OPTIONS: "--no-deprecation"
        with:
          workspaces: apps/desktop-launcher -> target
      
      - name: Build Desktop Launcher
        working-directory: apps/desktop-launcher
        run: cargo build --release --target ${{ matrix.target }}
        
      # --- STAGING ---
      - name: Prepare Release Folder (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          mkdir scuttle-package
          cp workspace.json scuttle-package/
          Get-ChildItem -Path . -Filter "scuttle.exe" -Recurse | Select-Object -First 1 | Copy-Item -Destination "scuttle-package/scuttle.exe"
          cp -r apps/web-client/dist scuttle-package/apps/web-client/dist
          cp -r apps/audio-server scuttle-package/apps/audio-server
          Compress-Archive -Path scuttle-package/* -DestinationPath ${{ matrix.artifact_name }}

      - name: Prepare Release Folder (Linux/Mac)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p scuttle-package/apps/web-client
          cp workspace.json scuttle-package/
          find . -type f -name "scuttle" -path "*/release/*" | head -n 1 | xargs -I {} cp {} scuttle-package/scuttle
          cp -r apps/web-client/dist scuttle-package/apps/web-client/dist
          cp -r apps/audio-server scuttle-package/apps/audio-server
          zip -r ${{ matrix.artifact_name }} scuttle-package

      # --- RELEASE ---
      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
