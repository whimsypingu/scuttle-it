name: Create Release

on:
  push:
    tags:
      - 'v*' # only triggers when a tag like v1.0.0 is pushed
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      # --- WEB CLIENT BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-client/package-lock.json

      - name: Build Web Client
        working-directory: apps/web-client
        run: |
          npm install
          npm run build

      # --- DESKTOP LAUNCHER BUILD ---
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-launcher -> target
      
      - name: Build Desktop Launcher
        working-directory: apps/desktop-launcher
        run: cargo build --release --target x86_64-pc-windows-msvc
        
      # --- STAGING ---
      - name: Prepare Release Folder
        run: |
          mkdir scuttle-package
          cp workspace.json scuttle-package/
          Get-ChildItem -Path "**/target/release/scuttle.exe" | Copy-Item -Destination "scuttle-package/scuttle.exe"
          cp -r apps/web-client/dist scuttle-package/dist
          cp -r apps/audio-server scuttle-package/audio-server
          Compress-Archive -Path scuttle-package/* -DestinationPath scuttle-win-x64.zip

      # --- RELEASE ---
      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: scuttle-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
